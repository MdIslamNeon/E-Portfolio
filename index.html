<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/d3aa9f2eac.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <section id="about-me">
      <nav>
        <div class="personal_logo">Md Islam</div>
        <ul class="nav_link-list">
          <li>
            <a
              href=""
              class="nav_link-anchor link_hover-effect link_hover-effect-black"
            >
              Languages
            </a>
          </li>
          <li>
            <a
              href=""
              class="nav_link-anchor link_hover-effect link_hover-effect-black"
            >
              Projects
            </a>
          </li>
          <li>
            <a href="" class="nav_link-anchor nav_link-anchor-primary">
              Contact
            </a>
          </li>
        </ul>
      </nav>
      <div class="flex flex-1">
        <div class="about-me_info row">
          <div class="about-me_info_container">
            <figure class="about-me_picture-mask">
              <img src="./assets/md-islam-pic_v2.jpg" alt="Picture of me" />
            </figure>
            <h1 class="about-me_info-title">
              Hey! I'm <span class="text-purple">Md Islam</span> 👋
            </h1>
            <p class="about-me_info-para">
              I'm a
              <strong class="text-purple">Computer Science</strong> student with
              a passion for building clean, intuitive web experiences. I love
              turning ideas into real, interactive products — from frontend
              interfaces to full-stack systems.
            </p>
            <div class="about-me_links">
              <a href="" class="about-me_link">
                <i class="fa-brands fa-linkedin"></i>
              </a>
              <a href="" class="about-me_link">
                <i class="fa-brands fa-github"></i>
              </a>
              <a href="" class="about-me_link">
                <i class="fa-regular fa-envelope"></i>
              </a>
              <a href="" class="about-me_link">
                <i class="fa-regular fa-file-lines"></i>
              </a>
            </div>
          </div>
          <figure class="about-me_img-container">
            <img
              src="./assets/undraw_websites.svg"
              class="about-me_img"
              alt=""
            />
          </figure>
        </div>
      </div>
    </section>
  </body>
</html>

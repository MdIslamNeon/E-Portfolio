  <rect x="270" y="30"  width="230" height="75" fill="white"/>
  <!-- Stem -->
  <rect x="350" y="103" width="70"  height="132" fill="white"/>
  <!-- Bottom bar -->
  <rect x="270" y="235" width="230" height="75" fill="white"/>


  <!-- M: 230px wide, 280px tall, starts at x=20 -->
  <polygon
    points="
      20,30
      95,30
      135,110
      175,30
      250,30
      250,310
      175,310
      175,200
      135,270
      95,200
      95,310
      20,310
    "
    fill="white"
  />

  <!-- I: same 280px tall, 230px wide, starts at x=270 -->
